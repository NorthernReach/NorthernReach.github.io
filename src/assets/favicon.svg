<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <rect width="128" height="128" rx="8" fill="#0a0a0a"/>
  <rect x="4" y="4" width="120" height="120" rx="6" fill="none" stroke="#6272a4" stroke-width="2"/>
  <!-- Terminal prompt cursor -->
  <text x="18" y="82" font-family="monospace" font-weight="bold" font-size="80" fill="#8be9fd">&gt;</text>
  <!-- Blinking cursor block -->
  <rect x="78" y="42" width="16" height="44" fill="#50fa7b">
    <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>
